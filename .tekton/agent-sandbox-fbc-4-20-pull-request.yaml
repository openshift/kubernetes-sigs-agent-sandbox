apiVersion: tekton.dev/v1
kind: PipelineRun
metadata:
  annotations:
    build.appstudio.openshift.io/repo: https://github.com/openshift/kubernetes-sigs-agent-sandbox?rev={{revision}}
    build.appstudio.redhat.com/commit_sha: '{{revision}}'
    build.appstudio.redhat.com/pull_request_number: '{{pull_request_number}}'
    build.appstudio.redhat.com/target_branch: '{{target_branch}}'
    pipelinesascode.tekton.dev/max-keep-runs: "3"
    pipelinesascode.tekton.dev/on-cel-expression:
      event == "pull_request" &&
      target_branch == "main" &&
      files.all.exists(path, path.matches('.tekton/fbc-pipeline.yaml$|.tekton/agent-sandbox-fbc-4-20-.*.yaml$|fbc/v4.20/Dockerfile$|fbc/v4.20/.*/catalog.json$'))
  creationTimestamp: null
  labels:
    appstudio.openshift.io/application: agent-sandbox-fbc-4-20
    appstudio.openshift.io/component: agent-sandbox-fbc-4-20
    pipelines.appstudio.openshift.io/type: build
  name: agent-sandbox-fbc-4-20-on-pull-request
  namespace: ose-osc-tenant
spec:
  params:
  - name: git-url
    value: '{{source_url}}'
  - name: revision
    value: '{{revision}}'
  - name: output-image
    value: quay.io/redhat-user-workloads/ose-osc-tenant/agent-sandbox-fbc-4-20:on-pr-{{revision}}
  - name: image-expires-after
    value: 5d
  - name: build-platforms
    value:
    - linux/x86_64
    - linux/s390x
  - name: path-context
    value: fbc/v4.20
  - name: dockerfile
    value: fbc/v4.20/Dockerfile
  pipelineRef:
    name: fbc-pipeline
  taskRunTemplate:
    serviceAccountName: build-pipeline-agent-sandbox-fbc-4-20
  workspaces:
  - name: git-auth
    secret:
      secretName: '{{ git_auth_secret }}'
status: {}
