# Fast checks for the OLM packaging module. Heavy e2e (kind + controller image build)
# stays local / optional via `make test-e2e`; controller e2e is gated by Prow presubmits.
name: agent-sandbox-operator

on:
  pull_request:
    paths:
      - 'agent-sandbox-operator/**'
      - 'k8s/**'
      - '.github/workflows/agent-sandbox-operator.yml'
  push:
    branches:
      - main
      - master
    paths:
      - 'agent-sandbox-operator/**'
      - 'k8s/**'
      - '.github/workflows/agent-sandbox-operator.yml'

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

defaults:
  run:
    working-directory: agent-sandbox-operator

jobs:
  test:
    name: Unit tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Setup Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: agent-sandbox-operator/go.mod
          cache-dependency-path: agent-sandbox-operator/go.sum

      - name: Run unit tests
        run: make test

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Setup Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: agent-sandbox-operator/go.mod
          cache-dependency-path: agent-sandbox-operator/go.sum

      - name: Run golangci-lint
        run: make lint
