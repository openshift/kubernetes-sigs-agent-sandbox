# Fast checks for the OLM packaging module. Heavy e2e (kind + controller image build)
# stays local / optional via `make test-e2e`; controller e2e is gated by Prow presubmits.
name: agent-sandbox-operator

on:
  pull_request:
    paths:
      - 'agent-sandbox-operator/**'
      - 'k8s/**'
      - '.github/workflows/agent-sandbox-operator.yml'
  push:
    branches:
      - main
      - master
    paths:
      - 'agent-sandbox-operator/**'
      - 'k8s/**'
      - '.github/workflows/agent-sandbox-operator.yml'

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

defaults:
  run:
    working-directory: agent-sandbox-operator

jobs:
  test:
    name: Unit tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Setup Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version-file: agent-sandbox-operator/go.mod
          cache-dependency-path: agent-sandbox-operator/go.sum

      - name: Run unit tests
        run: make test

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Setup Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version-file: agent-sandbox-operator/go.mod
          cache-dependency-path: agent-sandbox-operator/go.sum

      - name: Run golangci-lint
        run: make lint
