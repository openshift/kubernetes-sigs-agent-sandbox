apiVersion: operators.coreos.com/v1alpha1
kind: ClusterServiceVersion
metadata:
  annotations:
    alm-examples: '[]'
    capabilities: Basic Install
    categories: AI/Machine Learning
    createdAt: "2026-06-18T14:34:08Z"
    features.operators.openshift.io/disconnected: "true"
    features.operators.openshift.io/fips-compliant: "false"
    features.operators.openshift.io/proxy-aware: "false"
    features.operators.openshift.io/tls-profiles: "false"
    features.operators.openshift.io/token-auth-aws: "false"
    features.operators.openshift.io/token-auth-azure: "false"
    features.operators.openshift.io/token-auth-gcp: "false"
    operatorframework.io/suggested-namespace: agent-sandbox-system
    operators.openshift.io/valid-subscription: '["OpenShift Container Platform", "OpenShift
      Platform Plus"]'
    operators.operatorframework.io/builder: operator-sdk-v1.42.2
    operators.operatorframework.io/project_layout: go.kubebuilder.io/v4
    repository: https://github.com/kubernetes-sigs/agent-sandbox
    support: Agent Sandbox Community
  labels:
    operatorframework.io/arch.amd64: supported
    operatorframework.io/os.linux: supported
  name: agent-sandbox-operator.v0.9.0
  namespace: placeholder
spec:
  apiservicedefinitions: {}
  customresourcedefinitions:
    owned:
    - description: SandboxClaim requests a Sandbox from a warm pool for use by an
        AI agent.
      displayName: Sandbox Claim
      kind: SandboxClaim
      name: sandboxclaims.extensions.agents.x-k8s.io
      version: v1beta1
    - description: Sandbox provides an isolated, stateful runtime environment for
        AI agent workloads.
      displayName: Sandbox
      kind: Sandbox
      name: sandboxes.agents.x-k8s.io
      version: v1beta1
    - description: SandboxTemplate defines a reusable specification for creating Sandboxes.
      displayName: Sandbox Template
      kind: SandboxTemplate
      name: sandboxtemplates.extensions.agents.x-k8s.io
      version: v1beta1
    - description: SandboxWarmPool maintains a pool of pre-provisioned Sandboxes for
        fast allocation.
      displayName: Sandbox Warm Pool
      kind: SandboxWarmPool
      name: sandboxwarmpools.extensions.agents.x-k8s.io
      version: v1beta1
  description: Agent-sandbox enables easy management of isolated, stateful, singleton
    workloads, ideal for use cases like AI agent runtimes.
  displayName: Agent Sandbox Operator
  icon:
  - base64data: 
    mediatype: image/png
  install:
    spec:
      clusterPermissions:
      - rules:
        - apiGroups:
          - ""
          resources:
          - persistentvolumeclaims
          - pods
          - services
          verbs:
          - create
          - delete
          - get
          - list
          - patch
          - update
          - watch
        - apiGroups:
          - agents.x-k8s.io
          resources:
          - sandboxes
          verbs:
          - create
          - delete
          - get
          - list
          - patch
          - update
          - watch
        - apiGroups:
          - agents.x-k8s.io
          resources:
          - sandboxes/finalizers
          - sandboxes/status
          verbs:
          - get
          - patch
          - update
        - apiGroups:
          - coordination.k8s.io
          resources:
          - leases
          verbs:
          - create
          - get
          - list
          - patch
          - update
          - watch
        - apiGroups:
          - events.k8s.io
          resources:
          - events
          verbs:
          - create
          - patch
        - apiGroups:
          - ""
          resources:
          - pods
          verbs:
          - get
          - list
          - patch
          - update
          - watch
        - apiGroups:
          - ""
          - events.k8s.io
          resources:
          - events
          verbs:
          - create
          - patch
          - update
        - apiGroups:
          - agents.x-k8s.io
          resources:
          - sandboxes
          verbs:
          - create
          - delete
          - get
          - list
          - patch
          - update
          - watch
        - apiGroups:
          - coordination.k8s.io
          resources:
          - leases
          verbs:
          - create
          - delete
          - get
          - list
          - patch
          - update
          - watch
        - apiGroups:
          - extensions.agents.x-k8s.io
          resources:
          - sandboxclaims
          - sandboxtemplates
          - sandboxwarmpools
          verbs:
          - create
          - delete
          - get
          - list
          - patch
          - update
          - watch
        - apiGroups:
          - extensions.agents.x-k8s.io
          resources:
          - sandboxclaims/finalizers
          - sandboxclaims/status
          - sandboxtemplates/finalizers
          - sandboxwarmpools/finalizers
          - sandboxwarmpools/status
          verbs:
          - get
          - patch
          - update
        - apiGroups:
          - networking.k8s.io
          resources:
          - networkpolicies
          verbs:
          - create
          - delete
          - get
          - list
          - patch
          - update
          - watch
        serviceAccountName: agent-sandbox-controller
      deployments:
      - label:
          app: agent-sandbox-controller
        name: agent-sandbox-controller
        spec:
          replicas: 1
          selector:
            matchLabels:
              app: agent-sandbox-controller
          strategy: {}
          template:
            metadata:
              labels:
                app: agent-sandbox-controller
            spec:
              containers:
              - args:
                - --leader-elect=true
                - --extensions
                image: registry.redhat.io/agent-sandbox/agent-sandbox-rhel9-operator@sha256:f28ff9b35ff0c2527920eb45a09353c7e2ef055229351501d616650acffe12ff
                name: agent-sandbox-controller
                ports:
                - containerPort: 8080
                  name: metrics
                  protocol: TCP
                - containerPort: 8081
                  name: healthz
                  protocol: TCP
                resources: {}
                volumeMounts:
                - mountPath: /etc/sandbox-config
                  name: config-volume
                  readOnly: true
              serviceAccountName: agent-sandbox-controller
              volumes:
              - configMap:
                  name: agent-sandbox-config
                  optional: true
                name: config-volume
      - label:
          app: sandbox-router
        name: sandbox-router-deployment
        spec:
          replicas: 1
          selector:
            matchLabels:
              app: sandbox-router
          strategy: {}
          template:
            metadata:
              labels:
                app: sandbox-router
            spec:
              containers:
              - env:
                - name: ALLOW_UNAUTHENTICATED_ROUTER
                  value: "true"
                - name: PROXY_TIMEOUT_SECONDS
                  value: "180"
                image: registry.redhat.io/agent-sandbox/agent-sandbox-router@sha256:5e5e35309f282d82e1aff2a25d481a1cc57b004c3f0f2def3d6138f5bc2e85b2
                livenessProbe:
                  httpGet:
                    path: /healthz
                    port: 8080
                  initialDelaySeconds: 10
                  periodSeconds: 10
                name: router
                ports:
                - containerPort: 8080
                readinessProbe:
                  httpGet:
                    path: /healthz
                    port: 8080
                  initialDelaySeconds: 5
                  periodSeconds: 5
                resources:
                  limits:
                    cpu: "1"
                    memory: 1Gi
                  requests:
                    cpu: 250m
                    memory: 512Mi
                securityContext:
                  allowPrivilegeEscalation: false
                  capabilities:
                    drop:
                    - ALL
                  runAsNonRoot: true
              hostUsers: false
              securityContext:
                runAsNonRoot: true
                seccompProfile:
                  type: RuntimeDefault
              topologySpreadConstraints:
              - labelSelector:
                  matchLabels:
                    app: sandbox-router
                maxSkew: 1
                topologyKey: topology.kubernetes.io/zone
                whenUnsatisfiable: ScheduleAnyway
    strategy: deployment
  installModes:
  - supported: false
    type: OwnNamespace
  - supported: false
    type: SingleNamespace
  - supported: false
    type: MultiNamespace
  - supported: true
    type: AllNamespaces
  keywords:
  - agent
  - sandbox
  - kubernetes
  links:
  - name: Agent Sandbox
    url: https://agent-sandbox.sigs.k8s.io/
  maintainers:
  - email: eesposit@redhat.com
    name: Emanuele Giuseppe Esposito
  maturity: alpha
  provider:
    name: kubernetes-sigs
    url: https://agent-sandbox.sigs.k8s.io/
  version: 0.9.0
