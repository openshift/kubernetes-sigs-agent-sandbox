                  protocol: TCP
                - containerPort: 8081
                  name: healthz
                  protocol: TCP
                resources: {}
              serviceAccountName: agent-sandbox-controller
      - label:
          app: sandbox-router
        name: sandbox-router-deployment
        spec:
          replicas: 2
          selector:
            matchLabels:
              app: sandbox-router
          strategy: {}
          template:
            metadata:
              labels:
                app: sandbox-router
            spec:
              containers:
              - env:
                - name: PROXY_TIMEOUT_SECONDS
                  value: "180"
                image: registry.redhat.io/agent-sandbox/agent-sandbox-router@sha256:22a4c9e1e71521015a2a17b00e2aae9796688bbae184f54f06c54412abd1ecca
                livenessProbe:
                  httpGet:
                    path: /healthz
                    port: 8080
                  initialDelaySeconds: 10
                  periodSeconds: 10
                name: router
                ports:
                - containerPort: 8080
                readinessProbe:
                  httpGet:
                    path: /healthz
                    port: 8080
                  initialDelaySeconds: 5
                  periodSeconds: 5
                resources:
                  limits:
                    cpu: "1"
                    memory: 1Gi
                  requests:
                    cpu: 250m
                    memory: 512Mi
              securityContext:
                runAsGroup: 1000
                runAsUser: 1000
              topologySpreadConstraints:
              - labelSelector:
                  matchLabels:
                    app: sandbox-router
                maxSkew: 1
                topologyKey: topology.kubernetes.io/zone
                whenUnsatisfiable: ScheduleAnyway
