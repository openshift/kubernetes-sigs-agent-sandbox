apiVersion: v1
kind: Service
metadata:
  labels:
    app: sandbox-router
  name: sandbox-router-svc
  namespace: agent-sandbox-system
spec:
  ports:
  - name: http
    port: 8080
    protocol: TCP
    targetPort: 8080
  selector:
    app: sandbox-router
  type: ClusterIP
---
apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app: sandbox-router
  name: sandbox-router-deployment
  namespace: agent-sandbox-system
spec:
  replicas: 2
  selector:
    matchLabels:
      app: sandbox-router
  template:
    metadata:
      labels:
        app: sandbox-router
    spec:
      containers:
      - env:
        - name: PROXY_TIMEOUT_SECONDS
          value: "180"
        image: router:latest
        livenessProbe:
          httpGet:
            path: /healthz
            port: 8080
          initialDelaySeconds: 10
          periodSeconds: 10
        name: router
        ports:
        - containerPort: 8080
        readinessProbe:
          httpGet:
            path: /healthz
            port: 8080
          initialDelaySeconds: 5
          periodSeconds: 5
        resources:
          limits:
            cpu: 1000m
            memory: 1Gi
          requests:
            cpu: 250m
            memory: 512Mi
      securityContext:
        runAsGroup: 1000
        runAsUser: 1000
      topologySpreadConstraints:
      - labelSelector:
          matchLabels:
            app: sandbox-router
        maxSkew: 1
        topologyKey: topology.kubernetes.io/zone
        whenUnsatisfiable: ScheduleAnyway
